<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driving Tracker</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪪</text></svg>">

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --blue:#3b82f6;
  --green:#22c55e;
  --orange:#f59e0b;
}

body {
  margin:0;
  font-family:Segoe UI, Arial;
  background:var(--bg);
  color:white;
  display:flex;
  justify-content:center;
}

.container {
  width:100%;
  max-width:1000px;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.card {
  background:var(--card);
  padding:20px;
  border-radius:16px;
}

.full { grid-column: span 2; }

button {
  width:100%;
  height:50px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:15px;
  background:var(--blue);
  color:white;
  cursor:pointer;
}

.progress {
  background:#334155;
  height:14px;
  border-radius:8px;
  overflow:hidden;
}

.bar { height:100%; }

.item {
  padding:8px;
  margin:5px 0;
  background:#0f172a;
  border-radius:8px;
}

.active {
  outline:2px solid white;
}

/* calendar */
.calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day {
  height:40px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  background:#1e293b;
}
</style>
</head>

<body>

<div id="app" class="container"></div>

<script>

// ================= SETTINGS =================
const LESSON_PRICE = 185;
const TARGET = 37.5;

// ================= COSTS =================
const COSTS = {
  signup: 200,
  internal: 200,
  external: 361,
  license: 94
};

// ================= DATA =================
let lessons = JSON.parse(localStorage.getItem("lessons")) || [
  { date: "2026-01-11", type: "me" },
  { date: "2026-01-18", type: "mom" },
  { date: "2026-02-02", type: "me" },
  { date: "2026-02-09", type: "split" },
  { date: "2026-02-18", type: "me" },
  { date: "2026-02-22", type: "me" },
  { date: "2026-04-12", type: "me" }
];

// ================= FILTER =================
let filter = "all";

// ================= SAVE =================
function save(){
  localStorage.setItem("lessons", JSON.stringify(lessons));
}

// ================= LOGIC =================
function lessonUnits(){
  let total = 0;

  lessons.forEach(l=>{
    if(l.type === "me") total += 1;
    if(l.type === "mom") total += 1;
    if(l.type === "split") total += 2;
  });

  return total;
}

function lessonCost(){
  return lessonUnits() * LESSON_PRICE;
}

function grandTotal(){
  return lessonCost() +
    COSTS.signup +
    COSTS.internal +
    COSTS.external +
    COSTS.license;
}

// ================= ACTIONS =================
function add(type){
  lessons.push({
    date: new Date().toISOString().split("T")[0],
    type
  });

  save();
  show();
}

function setFilter(f){
  filter = f;
  show();
}

// ================= CALENDAR =================
function renderCalendar(){

  const today = new Date();
  const y = today.getFullYear();
  const m = today.getMonth();

  const first = new Date(y,m,1);
  const last = new Date(y,m+1,0);

  let html = "<div class='calendar'>";

  for(let i=0;i<first.getDay();i++){
    html += "<div></div>";
  }

  for(let d=1; d<=last.getDate(); d++){

    let date = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    let l = lessons.find(x=>x.date===date);

    let color = "";
    if(l?.type==="me") color="#3b82f6";
    if(l?.type==="mom") color="#22c55e";
    if(l?.type==="split") color="#f59e0b";

    html += `
      <div class="day" style="background:${color || '#1e293b'}">
        ${d}
      </div>
    `;
  }

  html += "</div>";
  return html;
}

// ================= UI =================
function show(){

  document.getElementById("app").innerHTML = `

  <div class="grid">

    <!-- PROGRESS -->
    <div class="card full">
      <h2>📊 Progress</h2>
      ${lessonUnits()} / ${TARGET}
      <div class="progress">
        <div class="bar" style="width:${(lessonUnits()/TARGET)*100}%;background:var(--blue);"></div>
      </div>
    </div>

    <!-- ADD -->
    <div class="card">
      <h2>➕ Add</h2>
      <button onclick="add('me')">Me</button>
      <button onclick="add('mom')">Mom</button>
      <button onclick="add('split')">Split</button>
    </div>

    <!-- COST -->
    <div class="card">
      <h2>💰 Cost</h2>
      <p>Lessons: ₪${lessonCost()}</p>
      <h3>Total: ₪${grandTotal()}</h3>
    </div>

    <!-- FILTER -->
    <div class="card full">
      <h3>🔍 Filter</h3>
      <button class="${filter==='all'?'active':''}" onclick="setFilter('all')">All</button>
      <button class="${filter==='me'?'active':''}" onclick="setFilter('me')">Me</button>
      <button class="${filter==='mom'?'active':''}" onclick="setFilter('mom')">Mom</button>
      <button class="${filter==='split'?'active':''}" onclick="setFilter('split')">Split</button>
    </div>

    <!-- CALENDAR -->
    <div class="card full">
      <h3>📅 Calendar</h3>
      ${renderCalendar()}
    </div>

    <!-- LOG -->
    <div class="card full">
      <h3>📋 Log</h3>
      ${
        lessons
          .filter(l => filter==="all" || l.type===filter)
          .map((l,i)=>`
            <div class="item">
              #${i+1} — ${l.date} — ${l.type}
            </div>
          `).join("")
      }
    </div>

  </div>

  `;

}

// ================= START =================
show();

</script>

</body>
</html>
