<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driving Tracker</title>

<!-- 🪪 TAB ICON -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪪</text></svg>">

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --blue:#3b82f6;
  --green:#22c55e;
}

body {
  margin:0;
  font-family:Segoe UI, Arial;
  background:var(--bg);
  color:white;
  display:flex;
  justify-content:center;
}

.container {
  width:100%;
  max-width:900px;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.card {
  background:var(--card);
  padding:20px;
  border-radius:16px;
}

.full { grid-column: span 2; }

button,input {
  width:100%;
  height:50px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:15px;
}

button { background:var(--blue); color:white; cursor:pointer; }
.green { background:var(--green); }

.progress {
  background:#334155;
  height:14px;
  border-radius:8px;
  overflow:hidden;
}

.bar { height:100%; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  max-width:900px;
  display:flex;
  background:var(--card);
}

.nav button { flex:1; border-radius:0; }
</style>
</head>

<body>

<div id="app" class="container"></div>

<div class="nav">
  <button onclick="show('dashboard')">Home</button>
  <button onclick="show('add')">Add</button>
</div>

<script>

// ===== 🔐 CONFIG =====
const GIST_ID = "mmprinting3d/8d5f490d59f7e7c21e12a60201ac6d93.js";
const TOKEN = "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";

// ===== SETTINGS =====
const TARGET = 30;
const LESSONS_PER_ENTRY = 2;
const DOUBLE = 370;
const HALF = 185;

// ===== DATA =====
let lessons = [];
let momCommitted = 1300;

// ===== GITHUB LOAD =====
async function loadFromGitHub(){
  const res = await fetch(`https://api.github.com/gists/${GIST_ID}`);
  const gist = await res.json();

  const content = gist.files["driving.json"].content;
  const data = JSON.parse(content);

  lessons = data.lessons || [];
  momCommitted = data.momCommitted || 1300;
}

// ===== GITHUB SAVE =====
async function saveToGitHub(){
  const data = {
    lessons,
    momCommitted
  };

  await fetch(`https://api.github.com/gists/${GIST_ID}`, {
    method: "PATCH",
    headers: {
      "Authorization": "token " + TOKEN,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      files: {
        "driving.json": {
          content: JSON.stringify(data, null, 2)
        }
      }
    })
  });
}

// ===== LOGIC =====
function totalLessons(){
  return lessons.length * LESSONS_PER_ENTRY;
}

function calcSpending(){
  let me=0, mom=0;

  lessons.forEach(l=>{
    if(l.payer==="me") me+=DOUBLE;
    if(l.payer==="mom") mom+=DOUBLE;
    if(l.payer==="split"){ me+=HALF; mom+=HALF; }
  });

  return {me,mom};
}

function remaining(){
  return (TARGET * HALF) - (calcSpending().me + calcSpending().mom);
}

// ===== UI =====
function show(s){
  if(s==="dashboard")dashboard();
  if(s==="add")addScreen();
}

function dashboard(){
  const {me,mom} = calcSpending();

  document.getElementById("app").innerHTML=`
    <div class="grid">

      <div class="card full">
        <h2>Lessons</h2>
        ${totalLessons()} / ${TARGET}
        <div class="progress">
          <div class="bar" style="width:${(totalLessons()/TARGET)*100}%;background:var(--blue);"></div>
        </div>
      </div>

      <div class="card">
        <h2>Remaining</h2>
        <h1>${remaining()}₪</h1>
      </div>

      <div class="card">
        <h2>Quick Add</h2>
        <button onclick="quickAdd('me')">I Paid</button>
        <button class="green" onclick="quickAdd('mom')">Mom Paid</button>
        <button onclick="quickAdd('split')">Split</button>
      </div>

      <div class="card">
        <h3>You</h3>
        ₪${me}
      </div>

      <div class="card">
        <h3>Mom</h3>
        ₪${mom} / ₪${momCommitted}
      </div>

    </div>
  `;
}

function addScreen(){
  document.getElementById("app").innerHTML=`
    <div class="card">
      <button onclick="quickAdd('me')">Add (Me)</button>
      <button onclick="quickAdd('mom')">Add (Mom)</button>
      <button onclick="quickAdd('split')">Add (Split)</button>
    </div>
  `;
}

// ===== ACTION =====
async function quickAdd(payer){
  let today = new Date().toISOString().split("T")[0];

  lessons.push({date:today,payer});

  await saveToGitHub();
  show("dashboard");
}

// ===== START =====
loadFromGitHub().then(()=>show("dashboard"));

</script>

</body>
</html>
