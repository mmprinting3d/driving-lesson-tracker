<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driving Tracker 🪪</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪪</text></svg>">

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --blue:#3b82f6;
  --green:#22c55e;
}

body {
  margin:0;
  font-family:Segoe UI, Arial;
  background:var(--bg);
  color:white;
  display:flex;
  justify-content:center;
}

.container {
  width:100%;
  max-width:1000px;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.card {
  background:var(--card);
  padding:20px;
  border-radius:16px;
}

.full { grid-column: span 2; }

button {
  width:100%;
  height:50px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:15px;
  background:var(--blue);
  color:white;
  cursor:pointer;
}

.progress {
  background:#334155;
  height:14px;
  border-radius:8px;
  overflow:hidden;
}

.bar { height:100%; }

.item {
  padding:8px;
  margin:5px 0;
  background:#0f172a;
  border-radius:8px;
}

/* active filter button */
.active {
  outline:2px solid white;
}
</style>
</head>

<body>

<div id="app" class="container"></div>

<script>

// ===== SETTINGS =====
const LESSON_PRICE = 185;
const TARGET = 37.5;

// ===== COSTS =====
const COSTS = {
  signup: 200,
  internal: 200,
  external: 361,
  license: 94
};

// ===== DATA =====
let lessons = [
  { date: "2026-01-11", type: "me" },
  { date: "2026-01-18", type: "mom" },
  { date: "2026-02-02", type: "me" },
  { date: "2026-02-09", type: "split" },
  { date: "2026-02-18", type: "me" },
  { date: "2026-02-22", type: "me" },
  { date: "2026-04-12", type: "me" }
];

// ===== FILTER =====
let filter = "all";

// ===== SAVE =====
function save(){
  localStorage.setItem("lessons", JSON.stringify(lessons));
}

// ===== LOGIC =====
function totalLessons(){
  return lessons.length;
}

function lessonCost(){
  return totalLessons() * LESSON_PRICE;
}

function grandTotal(){
  return lessonCost() +
    COSTS.signup +
    COSTS.internal +
    COSTS.external +
    COSTS.license;
}

// ===== FILTER =====
function setFilter(f){
  filter = f;
  show();
}

// ===== UI =====
function show(){

  document.getElementById("app").innerHTML=`

  <div class="grid">

    <!-- PROGRESS -->
    <div class="card full">
      <h2>📊 Progress</h2>
      ${totalLessons()} / ${TARGET}
      <div class="progress">
        <div class="bar" style="width:${(totalLessons()/TARGET)*100}%;background:var(--blue);"></div>
      </div>
    </div>

    <!-- ADD -->
    <div class="card">
      <h2>➕ Add Lesson</h2>
      <button onclick="add('me')">Me</button>
      <button onclick="add('mom')">Mom</button>
      <button onclick="add('split')">Split</button>
    </div>

    <!-- COST -->
    <div class="card">
      <h2>💰 Cost</h2>
      <p>Lessons: ₪${lessonCost()}</p>
      <h3>Total: ₪${grandTotal()}</h3>
    </div>

    <!-- FILTER -->
    <div class="card full">
      <h3>🔍 Filter</h3>
      <button class="${filter==='all'?'active':''}" onclick="setFilter('all')">All</button>
      <button class="${filter==='me'?'active':''}" onclick="setFilter('me')">Me</button>
      <button class="${filter==='mom'?'active':''}" onclick="setFilter('mom')">Mom</button>
      <button class="${filter==='split'?'active':''}" onclick="setFilter('split')">Split</button>
    </div>

    <!-- LOG -->
    <div class="card full">
      <h3>📅 Lesson Log</h3>

      ${
        lessons
          .filter(l => filter === "all" || l.type === filter)
          .map((l,i)=>`
            <div class="item">
              #${i+1} — ${l.date} — ${l.type}
            </div>
          `).join("")
      }

    </div>

  </div>

  `;
}

// ===== ACTIONS =====
function add(type){
  lessons.push({
    date:new Date().toISOString().split("T")[0],
    type
  });

  save();
  show();
}

// START
show();

</script>

</body>
</html>
